name: cvetofor
description: "Цветофор - магазин цветов"

publish_to: "none"

version: 1.0.5+5

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.13.0
  webview_flutter_wkwebview: ^3.23.0
  connectivity_plus: ^7.1.0
  url_launcher: ^6.3.2
  fluttertoast: ^9.0.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo.png"
  adaptive_icon_background: "#FFFFFF"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/icon/logo.png
